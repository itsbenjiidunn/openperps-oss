name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Node 22: the repo's toolchain (Vite 7, the node:test glob runner) needs
# >= 20.19 / 22.12. Standalone apps/examples use `npm install` rather than
# `npm ci`: their lockfiles omit the optional native dep `utf-8-validate`
# (pulled in by ws via @solana/web3.js) on the platform they were generated on,
# which trips `npm ci`'s strict in-sync check on the Linux runner. `npm install`
# reconciles it. The workspace root keeps `npm ci`.

jobs:
  rust:
    name: Rust program
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p openperps-program
      # The mainnet build excludes the devnet-only instructions; keep it compiling.
      - run: cargo check -p openperps-program --no-default-features

  packages:
    name: Packages (build, test, typecheck, pack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run typecheck
      - name: npm pack --dry-run
        run: |
          for p in sdk react keeper; do
            ( cd "packages/$p" && npm pack --dry-run )
          done

  web:
    name: apps/web (build, lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      # Root install runs `prepare`, which builds the packages' dist so the
      # app's file: dependencies resolve.
      - run: npm ci
      - run: npm install --no-audit --no-fund
        working-directory: apps/web
      - run: npm run build
        working-directory: apps/web
      - run: npm run lint
        working-directory: apps/web

  indexer:
    name: apps/indexer (typecheck, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
        working-directory: apps/indexer
      - run: npm run typecheck
        working-directory: apps/indexer
      - run: npm run build
        working-directory: apps/indexer

  examples:
    name: examples (build / typecheck)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example:
          - token-page
          - dex-terminal
          - launchpad
          - wallet-position-card
          - node-create-market
          - telegram-bot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      # Build the packages' dist first so each example's file: deps resolve.
      - run: npm ci
      - run: npm install --no-audit --no-fund
        working-directory: examples/${{ matrix.example }}
      - run: npm run build --if-present
        working-directory: examples/${{ matrix.example }}
      - run: npm run typecheck --if-present
        working-directory: examples/${{ matrix.example }}

  audit:
    name: Dependency audit (advisory)
    runs-on: ubuntu-latest
    # Advisory only: surface vulnerable dependencies without blocking merges
    # (each step is continue-on-error). Dependabot (.github/dependabot.yml) opens
    # the actual update PRs; this job is the visibility signal on every push/PR.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo audit
        continue-on-error: true
        run: |
          cargo install cargo-audit --locked
          cargo audit
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: npm audit (workspace)
        continue-on-error: true
        run: npm audit --audit-level=high
