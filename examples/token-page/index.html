<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenPerps token page example</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        background: #0b0f17;
        color: #e8edf2;
        font-family: system-ui, sans-serif;
      }
      main { max-width: 460px; margin: 56px auto; padding: 0 16px; }
      .openperps-chart { color: #2ee6c2; display: block; margin: 16px 0; }
      .openperps-trade { display: flex; gap: 8px; margin: 16px 0; }
      .openperps-trade-size {
        flex: 1; padding: 8px 10px; border-radius: 8px;
        border: 1px solid #24303f; background: #111826; color: inherit;
      }
      .openperps-trade-long, .openperps-trade-short {
        padding: 8px 16px; border-radius: 8px; border: 0;
        font-weight: 600; cursor: pointer; color: #06120c;
      }
      .openperps-trade-long { background: #2ee6c2; }
      .openperps-trade-short { background: #ff6b81; }
      .openperps-trade-error { color: #ff6b81; font-size: 13px; width: 100%; }
      .openperps-position { display: flex; gap: 12px; font-variant-numeric: tabular-nums; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
